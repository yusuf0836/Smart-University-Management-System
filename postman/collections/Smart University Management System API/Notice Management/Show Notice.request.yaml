$kind: http-request
description: Returns details of a specific notice.
url: "{{baseUrl}}/api/v1/notices/:id"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the notice.
  - key: notice
    value: "1"
    description: Notice ID.
examples: ./.resources/Show Notice.resources/examples
order: 3000
