$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/logout"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Logged out successfully"
      }
order: 1000
