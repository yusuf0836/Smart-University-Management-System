$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/me"
  method: GET
  headers:
    Content-Type: application/json
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "id": 1,
        "name": "Admin",
        "email": "admin@example.com"
      }
order: 1000
