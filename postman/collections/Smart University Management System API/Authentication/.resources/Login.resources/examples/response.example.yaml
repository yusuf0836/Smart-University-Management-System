$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/login"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: text
    content: '{"email":"admin@example.com","password":"password123"}'
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "token": "1|abcdefghijklmnopqrstuvwxyz",
        "user": {
          "id": 1,
          "name": "Admin",
          "email": "admin@example.com"
        }
      }
order: 1000
