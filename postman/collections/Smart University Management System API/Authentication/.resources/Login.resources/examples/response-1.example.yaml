$kind: http-example
name: response
request:
  url: "{{baseUrl}}/api/v1/login"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: text
    content: '{"email":"admin@example.com","password":"password123"}'
response:
  statusCode: 401
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": false,
        "message": "Invalid credentials"
      }
order: 2000
