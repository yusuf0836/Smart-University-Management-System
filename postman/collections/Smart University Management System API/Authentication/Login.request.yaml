$kind: http-request
name: Login
description: Authenticate a user and return a Sanctum access token.
url: "{{baseUrl}}/api/v1/login"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: "{\r

    \    \"email\": \"admin@sums.com\",\r

    \    \"password\": \"password\"\r

    }"
auth:
  type: noauth
examples: ./.resources/Login.resources/examples
order: 1000
