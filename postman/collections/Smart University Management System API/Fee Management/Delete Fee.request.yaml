$kind: http-request
description: Deletes a fee record.
url: "{{baseUrl}}/api/v1/fees/:id"
method: DELETE
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the fee.
  - key: fee
    value: "1"
    description: Fee ID.
examples: ./.resources/Delete Fee.resources/examples
order: 5000
