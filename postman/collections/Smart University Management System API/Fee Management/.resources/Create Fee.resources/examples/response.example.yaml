    Accept: application/json
  body:
    type: text
    content: '{"student_id":1,"semester_id":2,"amount":15000,"paid_amount":10000,"due_amount":5000,"payment_date":"2026-01-20","payment_method":"Bank","transaction_id":"TXN123456789","status":"Partial","remarks":"First installment paid."}'
