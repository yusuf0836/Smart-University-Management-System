$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/routines/:id"
  method: GET
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: "1"
      description: The ID of the routine.
    - key: routine
      value: "1"
      description: Routine ID.
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: '{"success": true}'
order: 1000
