$kind: http-request
description: Updates an existing class routine.
url: "{{baseUrl}}/api/v1/routines/:id"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the routine.
  - key: routine
    value: "1"
    description: Routine ID.
body:
  type: text
  content: '{"department_id":1,"semester_id":2,"course_id":5,"teacher_id":3,"day":"Sunday","start_time":"09:00","end_time":"10:30","room_no":"A-401","status":true}'
examples: ./.resources/Update Routine.resources/examples
order: 4000
