$kind: http-request
description: Returns details of a specific class routine.
url: "{{baseUrl}}/api/v1/routines/:id"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the routine.
  - key: routine
    value: "1"
    description: Routine ID.
examples: ./.resources/Show Routine.resources/examples
order: 3000
