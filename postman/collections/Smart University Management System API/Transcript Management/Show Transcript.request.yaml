$kind: http-request
description: Returns details of a specific transcript.
url: "{{baseUrl}}/api/v1/transcripts/:transcript_id"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: transcript_id
    value: "3"
    description: The ID of the transcript.
  - key: transcript
    value: "1"
    description: Transcript ID.
examples: ./.resources/Show Transcript.resources/examples
order: 3000
