$kind: http-request
description: Deletes a transcript.
url: "{{baseUrl}}/api/v1/transcripts/:transcript_id"
method: DELETE
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: transcript_id
    value: "3"
    description: The ID of the transcript.
  - key: transcript
    value: "1"
    description: Transcript ID.
examples: ./.resources/Delete Transcript.resources/examples
order: 5000
