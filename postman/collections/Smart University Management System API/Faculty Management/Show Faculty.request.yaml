$kind: http-request
description: Returns details of a specific faculty.
url: "{{baseUrl}}/api/v1/faculties/:id"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the faculty.
  - key: faculty
    value: "1"
    description: Faculty ID.
examples: ./.resources/Show Faculty.resources/examples
order: 3000
