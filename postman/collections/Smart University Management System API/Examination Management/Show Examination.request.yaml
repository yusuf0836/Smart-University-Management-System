$kind: http-request
description: Returns details of a specific examination.
url: "{{baseUrl}}/api/v1/examinations/:id"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the examination.
  - key: examination
    value: "1"
    description: Examination ID.
examples: ./.resources/Show Examination.resources/examples
order: 3000
