$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/examinations/:id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: "1"
      description: The ID of the examination.
    - key: examination
      value: "1"
      description: Examination ID.
  body:
    type: text
    content: '{"department_id":1,"semester_id":2,"exam_name":"Final Examination","exam_type":"Final","exam_date":"2026-12-20","start_time":"10:00","end_time":"13:00","venue":"Main Hall","status":true}'
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Examination updated successfully."
      }
order: 1000
