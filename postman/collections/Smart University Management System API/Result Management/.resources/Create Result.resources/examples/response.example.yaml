$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/results"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: text
    content: '{"enrollment_id":1,"marks":85,"remarks":"Excellent performance"}'
response:
  statusCode: 201
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Result created successfully."
      }
order: 1000
