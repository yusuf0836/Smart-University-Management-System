$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/results/:id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: "1"
      description: The ID of the result.
    - key: result
      value: "1"
      description: Result ID.
  body:
    type: text
    content: '{"enrollment_id":1,"marks":90,"remarks":"Updated after re-evaluation"}'
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Result updated successfully."
      }
order: 1000
