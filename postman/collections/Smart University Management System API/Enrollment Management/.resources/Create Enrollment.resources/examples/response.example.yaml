$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/enrollments"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: text
    content: '{"student_id":1,"course_id":5,"semester_id":2,"enrollment_date":"2026-01-15","status":"Enrolled"}'
response:
  statusCode: 201
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Student enrolled successfully."
      }
order: 1000
