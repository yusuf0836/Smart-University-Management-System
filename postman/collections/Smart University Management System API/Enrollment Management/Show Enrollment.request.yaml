$kind: http-request
description: Returns details of a specific enrollment.
url: "{{baseUrl}}/api/v1/enrollments/:id"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the enrollment.
  - key: enrollment
    value: "1"
    description: Enrollment ID.
examples: ./.resources/Show Enrollment.resources/examples
order: 3000
