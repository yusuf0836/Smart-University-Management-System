$kind: http-request
description: Deletes an enrollment.
url: "{{baseUrl}}/api/v1/enrollments/:id"
method: DELETE
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the enrollment.
  - key: enrollment
    value: "1"
    description: Enrollment ID.
examples: ./.resources/Delete Enrollment.resources/examples
order: 5000
