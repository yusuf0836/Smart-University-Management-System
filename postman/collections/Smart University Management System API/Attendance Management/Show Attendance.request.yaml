$kind: http-request
description: Returns details of a specific attendance record.
url: "{{baseUrl}}/api/v1/attendances/:id"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the attendance.
  - key: attendance
    value: "1"
    description: Attendance ID.
examples: ./.resources/Show Attendance.resources/examples
order: 3000
