$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/attendances"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: text
    content: '{"student_id":1,"course_id":3,"semester_id":2,"attendance_date":"2026-01-15","status":"Present","remarks":"Arrived 10 minutes late."}'
response:
  statusCode: 201
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Attendance created successfully."
      }
order: 1000
