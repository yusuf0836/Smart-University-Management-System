$kind: http-request
description: Updates an existing student's information.
url: "{{baseUrl}}/api/v1/students/:id"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the student.
  - key: student
    value: "1"
    description: The ID of the student.
body:
  type: text
  content: '{"department_id":1,"semester_id":2,"name":"Md Yusuf Ali","student_id":"20230001","email":"yusuf@example.com","phone":"01712345678","gender":"Male","date_of_birth":"2026-07-13T07:09:15","admission_date":"2026-07-13T07:09:15","status":"Active","blood_group":"O+"}'
examples: ./.resources/Update Student.resources/examples
order: 4000
