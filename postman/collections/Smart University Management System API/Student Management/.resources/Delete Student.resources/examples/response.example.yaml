$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/students/:id"
  method: DELETE
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: "1"
      description: The ID of the student.
    - key: student
      value: "1"
      description: The ID of the student.
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Student deleted successfully."
      }
order: 1000
