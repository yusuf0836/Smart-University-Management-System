$kind: http-request
description: Returns details of a specific student.
url: "{{baseUrl}}/api/v1/students/:id"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the student.
  - key: student
    value: "1"
    description: Student ID.
examples: ./.resources/Show Student.resources/examples
order: 3000
