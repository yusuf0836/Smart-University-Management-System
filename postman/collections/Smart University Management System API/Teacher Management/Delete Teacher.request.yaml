$kind: http-request
description: Deletes a teacher.
url: "{{baseUrl}}/api/v1/teachers/:id"
method: DELETE
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "1"
    description: The ID of the teacher.
  - key: teacher
    value: "1"
    description: The ID of the teacher.
examples: ./.resources/Delete Teacher.resources/examples
order: 5000
