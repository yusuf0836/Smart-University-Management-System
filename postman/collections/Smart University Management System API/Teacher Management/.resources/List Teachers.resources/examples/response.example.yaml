$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/teachers"
  method: GET
  headers:
    Content-Type: application/json
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "data": [
          {
            "id": 1,
            "employee_id": "EMP001",
            "name": "John Doe",
            "email": "john@example.com",
            "designation": "Assistant Professor"
          }
        ]
      }
order: 1000
