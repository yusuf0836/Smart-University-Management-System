$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/teachers/:id"
  method: GET
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: "1"
      description: The ID of the teacher.
    - key: teacher
      value: "1"
      description: The ID of the teacher.
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "data": {
          "id": 1,
          "employee_id": "EMP001",
          "name": "John Doe",
          "email": "john@example.com"
        }
      }
order: 1000
